<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bug & Moss | Morning Radio for the Internet</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Wellfleet&family=Space+Mono:wght@700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="desk-container">
        
        <div class="cutout tv-monitor">
            <div class="tv-antennae">
                <div class="antenna left"></div>
                <div class="antenna right"></div>
            </div>
            
            <div class="tv-body">
                <div class="tv-screen" id="tv-screen">
                    <div class="screen-glare"></div>
                </div>
                
                <div class="tv-controls">
                    <div class="tv-knob"></div>
                    <div class="tv-knob"></div>
                    <div class="tv-speaker">
                        <div class="speaker-hole"></div>
                        <div class="speaker-hole"></div>
                        <div class="speaker-hole"></div>
                        <div class="speaker-hole"></div>
                    </div>
                </div>
            </div>
            
            <div class="tv-label">Live Broadcast</div>
        </div>

        <div class="interactive-area">
            
            <div class="interactive-left">
                <div class="taped-note">
                    <div class="tape tape-top"></div>
                    <h3>The Morning<br>Telephone Show</h3>
                    <p>Live Weekdays<br><strong>7am - 8am EST</strong></p>
                    <p>on <a href="https://twitch.tv/bugandmoss" target="_blank">Twitch</a> and <a href="https://youtube.com/@bugandmosstv" target="_blank">YouTube</a></p>
                    <div class="tape tape-bottom"></div>
                </div>

                <div class="cutout phone-book">
                    <div class="spiral-binding">
                        <div class="ring"></div><div class="ring"></div><div class="ring"></div>
                        <div class="ring"></div><div class="ring"></div><div class="ring"></div>
                    </div>
                    <h3 id="directory-title">Yellow Pages</h3>
                    
                    <ul id="directory-list"></ul>
                    
                    <div class="book-controls">
                        <button id="page-prev" class="page-btn">◄ Prev</button>
                        <span id="page-indicator">1/1</span>
                        <button id="page-next" class="page-btn">Next ►</button>
                    </div>
                </div>
            </div>

            <div class="interactive-right">
                <div class="telephone-outer">
                    <div class="cutout telephone">

                        <div class="handset-end handset-ear-end">
                            <div class="speaker-pad">
                                <div class="dot-cluster">
                                    <div class="sp-dot"></div><div class="sp-dot"></div><div class="sp-dot"></div>
                                    <div class="sp-dot"></div><div class="sp-dot"></div><div class="sp-dot"></div>
                                </div>
                            </div>
                        </div>

                        <div class="phone-inner">
                            <div class="phone-screen" id="phone-screen"></div>
                            <div class="keypad">
                                <button class="key">1</button><button class="key">2</button><button class="key">3</button>
                                <button class="key">4</button><button class="key">5</button><button class="key">6</button>
                                <button class="key">7</button><button class="key">8</button><button class="key">9</button>
                                <button class="key">*</button><button class="key">0</button><button class="key">#</button>
                            </div>
                            <div class="phone-actions">
                                <button class="action-btn clear-btn" id="btn-clear">CLEAR</button>
                                <button class="action-btn call-btn" id="btn-call">CALL</button>
                            </div>
                        </div>

                        <div class="handset-end handset-mouth-end">
                            <div class="speaker-pad">
                                <div class="dot-cluster">
                                    <div class="sp-dot"></div><div class="sp-dot"></div><div class="sp-dot"></div>
                                    <div class="sp-dot"></div><div class="sp-dot"></div><div class="sp-dot"></div>
                                </div>
                            </div>
                        </div>

                    </div><svg class="phone-cord-svg" viewBox="0 0 60 180" xmlns="http://www.w3.org/2000/svg">
                        <path d="M 30 0 C 52 8, 52 24, 30 28 C 8 32, 8 48, 30 52 C 52 56, 52 72, 30 76 C 8 80, 8 96, 30 100 C 52 104, 52 120, 30 124 C 8 128, 8 144, 30 148 C 52 152, 52 168, 30 172" fill="none" stroke="#cfc0a4" stroke-width="7" stroke-linecap="round"/>
                    </svg>
                </div>
            </div>

        </div>
            
        <a href="https://patreon.com/bugandmoss" target="_blank" class="cutout note patreon-note">
            <h2>KEEP US GOING!</h2>
            <span style="font-size: 1.2rem;">(Support on Patreon)</span>
        </a>

        <a href="/podcast" class="cutout note nav-podcast">The Podcast</a>

        <a href="https://twitch.tv/bugandmoss" target="_blank" class="cutout note social-twitch">Twitch</a>
        <a href="https://youtube.com/@bugandmosstv" target="_blank" class="cutout note social-youtube">YouTube</a>
        <a href="https://instagram.com/848mossbug" target="_blank" class="cutout note social-insta">Instagram</a>
        <a href="https://tiktok.com/@bugandmoss" target="_blank" class="cutout note social-tiktok">TikTok</a>
        <br>
        <br>
        <a href="/soundboard.html" class="cutout note nav-soundboard">Soundboard</a>

    </div>

    <script src="script.js"></script>
</body>
</html>
