<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bug & Moss ✆ The Morning Telephone Show</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Wellfleet&family=Space+Mono:wght@700&family=Ranchers&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="desk-container">
        
        <div class="interactive-layout">
            
            <div class="desk-row top-row">
                
                <div class="cutout tv-monitor">
                    <div class="tv-antennae">
                        <div class="antenna left"><div class="antenna-tip"></div></div>
                        <div class="antenna-base"></div>
                        <div class="antenna right"><div class="antenna-tip"></div></div>
                    </div>

                    <div class="tv-body">
                        <div class="tv-bezel">
                            <div class="tv-screen" id="tv-screen">
                                </div>
                            <div class="tv-brand">MOSS-TRONIC</div>
                        </div>

                        <div class="tv-controls">
                            <div class="knob-group">
                                <div class="knob-stub"></div>
                                <div class="tv-knob vhf-knob"><div class="knob-ridge"></div><div class="knob-cap"></div></div>
                                <span class="knob-label">VHF</span>
                            </div>
                            <div class="knob-group">
                                <div class="knob-stub"></div>
                                <div class="tv-knob uhf-knob"><div class="knob-ridge"></div><div class="knob-cap"></div></div>
                                <span class="knob-label">UHF</span>
                            </div>
                            <div class="knob-group">
                                <div class="knob-stub"></div>
                                <div class="tv-knob whf-knob"><div class="knob-ridge"></div><div class="knob-cap"></div></div>
                                <span class="knob-label">WHF</span>
                            </div>
                            
                            <div class="power-led-container">
                                <div class="power-led"></div>
                                <span class="knob-label">POWER</span>
                            </div>

                            <div class="tv-speaker-grille"></div>
                        </div>
                    </div>
                    <div class="tv-label-tape">LAST BROADCAST</div>
                </div>
                
                <div class="top-right-column">
                    <div class="taped-note">
                        <div class="tape tape-top"></div>
                        <h3>The Morning<br>Telephone Show</h3>
                        <p>Live Weekdays<br><strong>7am - 8am EST</strong></p>
                        <p style="margin-top:0.5rem; font-size:0.9rem;">On <a href="https://twitch.tv/bugandmoss" target="_blank">Twitch</a> and <a href="https://youtube.com/bugandmoss" target="_blank">YouTube</a>!</p>
                        <div class="tape tape-bottom"></div>
                    </div>
                    
                    <a href="https://patreon.com/bugandmoss" target="_blank" class="cutout note patreon-note">
                        <h2>KEEP US GOING!</h2>
                        <span style="font-size: 1.2rem;">(Support on Patreon)</span>
                    </a>
                </div>

            </div>

            <div class="desk-row middle-row">
                <div class="cutout phone-book-folded">
                    <div id="index-tab" class="pb-index-tab">INDEX</div>
                    
                    <div class="pb-folded-spine"></div>
                    <div class="pb-header">
                        <h2>Yellow Pages</h2>
                        <p>Directory of Bug & Moss & Friends</p>
                    </div>

                    <div id="directory-list" class="pb-directory-single"></div>
                    <div id="dir-controls" class="pb-controls">
                        <button id="pb-prev" class="pb-btn" title="Previous Page"></button>
                        <div class="pb-indicator-container">
                            <span id="pb-page-indicator">Pg 1</span>
                        </div>
                        <button id="pb-next" class="pb-btn" title="Next Page"></button>
                    </div>

                    <div id="index-view" style="display: none; width: 100%;">
                        <div class="pb-category-header" style="margin-top:0;">Directory Index</div>
                        <div id="index-list-container" style="display: flex; flex-direction: column; gap: 0.6rem; min-height: 380px;"></div>
                        
                        <div class="pb-controls">
                            <button id="idx-prev" class="pb-btn" title="Previous Index Page"></button>
                            <div class="pb-indicator-container">
                                <span id="idx-page-indicator">Idx Pg 1</span>
                            </div>
                            <button id="idx-next" class="pb-btn" title="Next Index Page"></button>
                        </div>
                    </div>
                </div>
                <div class="telephone-outer">
                    <div class="telephone">
                
                        <div class="earpiece-section">
                            <div class="hook-switch"></div>
                            <div class="earpiece-block">
                                <div class="speaker-indent">
                                    <div class="ear-hole-radial">
                                        <div class="ear-hole center"></div>
                                        
                                        <div class="ear-hole inner" style="--i:0;"></div>
                                        <div class="ear-hole inner" style="--i:1;"></div>
                                        <div class="ear-hole inner" style="--i:2;"></div>
                                        <div class="ear-hole inner" style="--i:3;"></div>
                                        <div class="ear-hole inner" style="--i:4;"></div>
                                        <div class="ear-hole inner" style="--i:5;"></div>
                                        
                                        <div class="ear-hole outer" style="--i:0;"></div>
                                        <div class="ear-hole outer" style="--i:1;"></div>
                                        <div class="ear-hole outer" style="--i:2;"></div>
                                        <div class="ear-hole outer" style="--i:3;"></div>
                                        <div class="ear-hole outer" style="--i:4;"></div>
                                        <div class="ear-hole outer" style="--i:5;"></div>
                                        <div class="ear-hole outer" style="--i:6;"></div>
                                        <div class="ear-hole outer" style="--i:7;"></div>
                                        <div class="ear-hole outer" style="--i:8;"></div>
                                        <div class="ear-hole outer" style="--i:9;"></div>
                                        <div class="ear-hole outer" style="--i:10;"></div>
                                        <div class="ear-hole outer" style="--i:11;"></div>
                                    </div>
                                </div>
                            </div>
                        </div>
                
                        <div class="handle-block">
                            <div class="keypad-wrapper">
                                <div class="phone-screen" id="phone-screen"></div>
                                
                                <div class="top-actions">
                                    <button class="btn action-btn clear-btn" id="btn-clear">CLEAR</button>
                                    <button class="btn action-btn call-btn" id="btn-call">CALL</button>
                                </div>

                                <div class="keypad-grid">
                                    <button class="btn key"><span class="num key-num">1</span></button>
                                    <button class="btn key"><span class="num key-num">2</span><span class="alpha">ABC</span></button>
                                    <button class="btn key"><span class="num key-num">3</span><span class="alpha">DEF</span></button>
                                    <button class="btn key"><span class="num key-num">4</span><span class="alpha">GHI</span></button>
                                    <button class="btn key"><span class="num key-num">5</span><span class="alpha">JKL</span></button>
                                    <button class="btn key"><span class="num key-num">6</span><span class="alpha">MNO</span></button>
                                    <button class="btn key"><span class="num key-num">7</span><span class="alpha">PQRS</span></button>
                                    <button class="btn key"><span class="num key-num">8</span><span class="alpha">TUV</span></button>
                                    <button class="btn key"><span class="num key-num">9</span><span class="alpha">WXYZ</span></button>
                                    <button class="btn key"><span class="num key-num" style="left:8px">*</span><span class="alpha" style="font-size:5px">TONE</span></button>
                                    <button class="btn key"><span class="num key-num">0</span><span class="alpha">OPER</span></button>
                                    <button class="btn key"><span class="num key-num" style="left:8px; font-style:normal;">#</span></button>
                                </div>

                                <div class="config-row">
                                    <div class="config-col">
                                        <span class="micro-text">RINGER</span>
                                        <div class="switch-groove"><div class="switch-nub nub-left"></div></div>
                                        <span class="micro-text" style="transform: scale(0.8);">OFF LO HI</span>
                                    </div>
                                    <div class="config-col">
                                        <span class="micro-text">PROG/MUTE</span>
                                        <div class="switch-groove"><div class="switch-nub nub-center"></div></div>
                                        <span class="micro-text"></span>
                                    </div>
                                    <div class="config-col">
                                        <span class="micro-text">DIAL</span>
                                        <div class="switch-groove"><div class="switch-nub nub-left"></div></div>
                                        <span class="micro-text" style="word-spacing: 2px;">TT DP</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                
                        <div class="mouthpiece-block">
                            <div class="brand">
                                <svg viewBox="0 0 24 24" stroke="#111" stroke-width="1.5" fill="none">
                                    <circle cx="12" cy="12" r="10" />
                                    <ellipse cx="12" cy="12" rx="4" ry="10" />
                                    <line x1="2" y1="12" x2="22" y2="12" />
                                    <line x1="4.5" y1="6" x2="19.5" y2="6" />
                                    <line x1="4.5" y1="18" x2="19.5" y2="18" />
                                </svg>
                                <span class="at-t">BM&F</span>
                                <span class="model">tel</span>
                            </div>
                            <div class="mouth-slits">
                                <div class="m-slit"></div>
                                <div class="m-slit"></div>
                            </div>
                        </div>

                        <div class="cord-plug"></div>
                        
                    </div> <svg class="phone-cord-svg" viewBox="0 0 60 180" xmlns="http://www.w3.org/2000/svg">
                        <path
                            d="M 30 0 C 52 8, 52 24, 30 28 C 8 32, 8 48, 30 52 C 52 56, 52 72, 30 76 C 8 80, 8 96, 30 100 C 52 104, 52 120, 30 124 C 8 128, 8 144, 30 148 C 52 152, 52 168, 30 172"
                            fill="none" stroke="#cfc0a4" stroke-width="7" stroke-linecap="round" />
                    </svg>
                
                </div> <div class="cutout scratch-pad">
                    <div class="scratch-pad-binding"></div>
                    <textarea id="scratch-pad-text" spellcheck="false" 
                    placeholder="Patreon: 0426 
Discord: 6677
PodCast: 1994
PodCube: 2048
click or tap to edit..."></textarea>
                </div>

            </div>

        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
