<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bug & Moss ✆ The Morning Telephone Show</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Wellfleet&family=Space+Mono:wght@700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="desk-container">
        
        <div class="interactive-layout">
            
            <div class="desk-row top-row">
                
                <div class="cutout tv-monitor">
                    <div class="tv-antennae">
                        <div class="antenna left"></div><div class="antenna right"></div>
                    </div>
                    <div class="tv-body">
                        <div class="tv-screen" id="tv-screen"><div class="screen-glare"></div></div>
                        <div class="tv-controls">
                            <div class="tv-knob"></div><div class="tv-knob"></div>
                            <div class="tv-speaker">
                                <div class="speaker-hole"></div><div class="speaker-hole"></div><div class="speaker-hole"></div><div class="speaker-hole"></div>
                            </div>
                        </div>
                    </div>
                    <div class="tv-label">Last Broadcast</div>
                </div>
                
                <div class="top-right-column">
                    <div class="taped-note">
                        <div class="tape tape-top"></div>
                        <h3>The Morning<br>Telephone Show</h3>
                        <p>Live Weekdays<br><strong>7am - 8am EST</strong></p>
                        <p style="margin-top:0.5rem; font-size:0.9rem;">On <a href="https://twitch.tv/bugandmoss" target="_blank">Twitch</a> and <a href="https://youtube.com/bugandmoss" target="_blank">YouTube</a>!</p>
                        <div class="tape tape-bottom"></div>
                    </div>
                    
                    <a href="https://patreon.com/bugandmoss" target="_blank" class="cutout note patreon-note">
                        <h2>KEEP US GOING!</h2>
                        <span style="font-size: 1.2rem;">(Support on Patreon)</span>
                    </a>
                </div>

            </div>

            <div class="desk-row middle-row">
                
                <div class="telephone-outer">
                    
                    <div class="telephone">
                        <div class="handset-end">
                            <div class="speaker-pad"><div class="dot-cluster"><div class="sp-dot"></div><div class="sp-dot"></div><div class="sp-dot"></div><div class="sp-dot"></div><div class="sp-dot"></div><div class="sp-dot"></div></div></div>
                        </div>
                        
                        <div class="phone-inner">
                            <div class="phone-screen" id="phone-screen"></div>
                            <div class="keypad">
                                <button class="key">1</button><button class="key">2</button><button class="key">3</button>
                                <button class="key">4</button><button class="key">5</button><button class="key">6</button>
                                <button class="key">7</button><button class="key">8</button><button class="key">9</button>
                                <button class="key">*</button><button class="key">0</button><button class="key">#</button>
                            </div>
                            <div class="phone-actions">
                                <button class="action-btn clear-btn" id="btn-clear">CLEAR</button>
                                <button class="action-btn call-btn" id="btn-call">CALL</button>
                            </div>
                        </div>

                        <div class="handset-end">
                            <div class="speaker-pad"><div class="dot-cluster"><div class="sp-dot"></div><div class="sp-dot"></div><div class="sp-dot"></div><div class="sp-dot"></div><div class="sp-dot"></div><div class="sp-dot"></div></div></div>
                        </div>
                    </div>

                    <svg class="phone-cord-svg" viewBox="0 0 60 180" xmlns="http://www.w3.org/2000/svg">
                        <path d="M 30 0 C 52 8, 52 24, 30 28 C 8 32, 8 48, 30 52 C 52 56, 52 72, 30 76 C 8 80, 8 96, 30 100 C 52 104, 52 120, 30 124 C 8 128, 8 144, 30 148 C 52 152, 52 168, 30 172" fill="none" stroke="#cfc0a4" stroke-width="7" stroke-linecap="round"/>
                    </svg>
                    
                </div>

                <div class="cutout scratch-pad">
                    <div class="scratch-pad-binding"></div>
                    <textarea id="scratch-pad-text" spellcheck="false" 
                    placeholder="Patreon: 0426 
Discord: 6477
PodCast: 1994
PodCube: 2048
click or tap to edit..."></textarea>
                </div>

            </div>

            <div class="desk-row">
                <div class="cutout phone-book-folded">
                    <div class="pb-folded-spine"></div>
                    <div class="pb-header">
                        <h2>Yellow Pages</h2>
                        <p>Directory of Bug & Moss & Friends</p>
                    </div>

                    <div id="directory-list" class="pb-directory-single"></div>
                    <div class="pb-controls">
                        <button id="pb-prev" class="pb-btn" title="Previous Page"></button>
                        <div class="pb-indicator-container">
                            <span id="pb-page-indicator">Pg 1</span>
                        </div>
                        <button id="pb-next" class="pb-btn" title="Next Page"></button>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
