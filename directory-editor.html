<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Directory Visual Editor</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-desk: #4b6d59;
            --color-tv: #95c7ff;
            --color-patreon: #ff914d;
            --color-podcast: #3bb273;
            --color-youtube: #ff6b6b;
            --hard-shadow: 4px 4px 0px rgba(0,0,0,0.3);
        }

        body {
            background-color: var(--bg-desk);
            font-family: 'Fredoka', sans-serif;
            color: #111;
            margin: 0;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .editor-container {
            width: 100%;
            max-width: 950px;
            background: #fff9e6;
            border-radius: 12px;
            padding: 2rem;
            box-shadow: 8px 8px 0px rgba(0,0,0,0.4);
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        h1 { margin: 0; color: var(--color-patreon); font-size: 2.5rem; text-align: center; }

        .toolbar { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; }

        button {
            font-family: 'Fredoka', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            border: none;
            border-radius: 6px;
            padding: 0.5rem 1rem;
            cursor: pointer;
            box-shadow: var(--hard-shadow);
            transition: all 0.1s;
        }
        button:active { transform: translate(2px, 2px); box-shadow: 0px 0px 0px rgba(0,0,0,0.2); }

        .btn-add { background-color: var(--color-tv); }
        .btn-copy { background-color: #3b82f6; color: white; } 
        .btn-download { background-color: var(--color-podcast); color: white; }
        .btn-reset { background-color: var(--color-youtube); color: white; }
        .btn-delete { background-color: var(--color-youtube); color: white; font-size: 0.8rem; padding: 0.3rem 0.6rem; }

        .category-card {
            background: #fff;
            border: 2px dashed #ccc;
            border-radius: 8px;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            transition: background-color 0.2s ease;
        }

        .category-header { display: flex; gap: 1rem; align-items: center; }
        .category-header input { 
            flex-grow: 1; 
            font-size: 1.5rem; 
            font-family: 'Fredoka', sans-serif; 
            font-weight: 700; 
            border: none; 
            border-bottom: 2px solid #ccc; 
            outline: none; 
            color: var(--color-patreon);
        }

        .btn-reorder {
            background-color: #ddd;
            color: #333;
            font-size: 0.7rem;
            padding: 2px 6px;
            min-height: 20px;
            box-shadow: 2px 2px 0px rgba(0,0,0,0.2);
        }
        .btn-reorder:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            box-shadow: none;
            transform: none;
        }

        .reorder-controls {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .entry-row {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            background: #f4ede1;
            padding: 0.5rem;
            border-radius: 6px;
            border: 2px solid transparent;
            transition: box-shadow 0.1s, border 0.1s, opacity 0.2s;
        }

        .entry-row.is-ad {
            background: #fff9d6;
            border: 2px solid var(--color-youtube);
        }
        
        .entry-row.is-hidden {
            opacity: 0.6;
            background: #e5e7eb;
            border: 2px dashed #9ca3af;
        }

        .entry-main-fields {
            display: grid;
            grid-template-columns: auto 2fr 1fr 2fr auto auto auto;
            gap: 0.5rem;
            align-items: center;
            width: 100%;
        }

        .entry-ad-fields {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 0.5rem;
            width: 100%;
            padding-left: 2.5rem; 
            box-sizing: border-box;
        }
        
        .entry-secret-fields {
            width: 100%;
            padding-left: 2.5rem; 
            box-sizing: border-box;
        }

        .checkbox-label {
            font-family: var(--font-cartoon);
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            color: var(--color-patreon);
            font-weight: 700;
        }
        
        .checkbox-label.secret { color: #6b7280; }

        .drag-handle {
            cursor: grab;
            font-size: 1.4rem;
            color: #999;
            padding: 0 8px;
            user-select: none;
        }

        .drag-handle:active {
            cursor: grabbing;
        }

        .entry-row.dragging {
            opacity: 0.5;
            background: #e0d5c1;
        }

        .drag-over-row { box-shadow: 0 -4px 0 0 var(--color-podcast); }
        .drag-over-card { background: #f0fdf4; border-color: var(--color-podcast); }

        input[type="text"] {
            font-family: 'Space Mono', monospace;
            padding: 0.6rem;
            border: 1px solid #aaa;
            border-radius: 4px;
            width: 100%;
            box-sizing: border-box;
            font-size: 0.9rem;
        }
        
        .clash-warning {
            border: 2px solid var(--color-youtube) !important;
            background-color: #ffe5e5 !important;
            color: var(--color-youtube);
            font-weight: bold;
        }

        .status-bar { text-align: center; font-family: 'Space Mono', monospace; color: #666; font-size: 0.9rem;}
    </style>
</head>
<body>

    <div class="editor-container">
        <h1>Directory Editor</h1>
        
        <div class="toolbar">
            <button class="btn-add" id="btn-add-category">+ Add Page</button>
            <button class="btn-copy" id="btn-copy">📋 Copy JSON</button>
            <button class="btn-download" id="btn-download">💾 Download JSON</button>
            <button class="btn-reset" id="btn-reset">⚠️ Reset to File</button>
        </div>

        <div id="categories-container"></div>

        <div class="status-bar" id="save-status">Loading data...</div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const container = document.getElementById('categories-container');
            const saveStatus = document.getElementById('save-status');

            const STORAGE_KEY = 'bugandmoss-dir-draft-v4'; // Bumped version for hidden items
            let directoryData = [];

            // 1. Initialize and Load Data
            async function init() {
                const savedDraft = localStorage.getItem(STORAGE_KEY);
                
                if (savedDraft) {
                    try {
                        directoryData = JSON.parse(savedDraft);
                        saveStatus.innerText = "Loaded unsaved draft from browser memory.";
                    } catch (e) {
                        directoryData = [];
                    }
                } 
                
                if (!directoryData || directoryData.length === 0) {
                    try {
                        const response = await fetch('directory.json?t=' + Date.now());
                        if (response.ok) {
                            directoryData = await response.json();
                            saveStatus.innerText = "Loaded fresh from directory.json";
                        } else {
                            directoryData = [{ title: "New Page", entries: [] }];
                        }
                    } catch (e) {
                        directoryData = [{ title: "New Page", entries: [] }];
                        saveStatus.innerText = "Warning: Could not read directory.json. Starting fresh.";
                    }
                }
                
                renderEditor();
                saveDraft();
            }

            function escapeHtml(unsafe) {
                if (!unsafe) return "";
                return unsafe.toString()
                     .replace(/&/g, "&amp;")
                     .replace(/</g, "&lt;")
                     .replace(/>/g, "&gt;")
                     .replace(/"/g, "&quot;")
                     .replace(/'/g, "&#039;");
            }

            // 2. Render UI
            function renderEditor() {
                container.innerHTML = '';
                
                directoryData.forEach((category, cIdx) => {
                    const card = document.createElement('div');
                    card.className = 'category-card';

                    let html = `
                        <div class="category-header">
                            <div class="reorder-controls">
                                <button class="btn-reorder move-cat-up" data-cidx="${cIdx}" ${cIdx === 0 ? 'disabled' : ''}>▲</button>
                                <button class="btn-reorder move-cat-down" data-cidx="${cIdx}" ${cIdx === directoryData.length - 1 ? 'disabled' : ''}>▼</button>
                            </div>
                            <input type="text" class="input-title" data-cidx="${cIdx}" value="${escapeHtml(category.title)}" placeholder="Page Title (e.g. Our Friends)">
                            <button class="btn-delete delete-cat" data-cidx="${cIdx}">Delete Page</button>
                        </div>
                    `;

                    const entries = category.entries || [];
                    entries.forEach((entry, eIdx) => {
                        const isAd = !!entry.isAd; 
                        const isHidden = !!entry.isHidden;
                        
                        let rowClasses = 'entry-row';
                        if (isAd) rowClasses += ' is-ad';
                        if (isHidden) rowClasses += ' is-hidden';
                        
                        html += `
                        <div class="${rowClasses}" data-cidx="${cIdx}" data-eidx="${eIdx}">
                            <div class="entry-main-fields">
                                <div class="drag-handle">☰</div>
                                <input type="text" class="input-name" data-cidx="${cIdx}" data-eidx="${eIdx}" value="${escapeHtml(entry.name)}" placeholder="Name (e.g. Patreon)">
                                <input type="text" class="input-num" data-cidx="${cIdx}" data-eidx="${eIdx}" value="${escapeHtml(entry.number)}" placeholder="Number (e.g. *800#)">
                                <input type="text" class="input-url" data-cidx="${cIdx}" data-eidx="${eIdx}" value="${escapeHtml(entry.url)}" placeholder="URL (e.g. /podcast)">
                                
                                <label class="checkbox-label">
                                    <input type="checkbox" class="input-is-ad" data-cidx="${cIdx}" data-eidx="${eIdx}" ${isAd ? 'checked' : ''} ${isHidden ? 'disabled' : ''}>
                                    Ad
                                </label>
                                <label class="checkbox-label secret" title="Hides from book, dialable as secret code">
                                    <input type="checkbox" class="input-is-hidden" data-cidx="${cIdx}" data-eidx="${eIdx}" ${isHidden ? 'checked' : ''}>
                                    Secret
                                </label>
                                
                                <button class="btn-delete delete-ent" data-cidx="${cIdx}" data-eidx="${eIdx}">X</button>
                            </div>
                            
                            ${isAd && !isHidden ? `
                            <div class="entry-ad-fields">
                                <input type="text" class="input-subtitle" data-cidx="${cIdx}" data-eidx="${eIdx}" value="${escapeHtml(entry.subtitle || '')}" placeholder="Subtitle (e.g. Keep Us On The Air!)">
                                <input type="text" class="input-desc" data-cidx="${cIdx}" data-eidx="${eIdx}" value="${escapeHtml(entry.description || '')}" placeholder="Ad Description Text...">
                            </div>
                            ` : ''}
                            
                            ${isHidden ? `
                            <div class="entry-secret-fields">
                                <input type="text" class="input-audio" data-cidx="${cIdx}" data-eidx="${eIdx}" value="${escapeHtml(entry.audioUrl || '')}" placeholder="Audio URL (Optional, plays sound instead of opening URL)">
                            </div>
                            ` : ''}
                        </div>`;
                    });

                    html += `<button class="btn-add add-ent" data-cidx="${cIdx}">+ Add Number</button>`;
                    card.innerHTML = html;
                    container.appendChild(card);
                });
                
                checkNumberClashes();
            }

            // 3. Save Draft
            function saveDraft() {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(directoryData));
            }

            // 3.5 Check for Number Clashes
            function checkNumberClashes() {
                const numInputs = document.querySelectorAll('.input-num');
                const seenNumbers = new Set();
                const clashNumbers = new Set();

                numInputs.forEach(input => {
                    const num = input.value.trim();
                    if (num !== "") {
                        if (seenNumbers.has(num)) { clashNumbers.add(num); } 
                        else { seenNumbers.add(num); }
                    }
                });

                let hasClash = false;
                numInputs.forEach(input => {
                    const num = input.value.trim();
                    if (num !== "" && clashNumbers.has(num)) {
                        input.classList.add('clash-warning');
                        hasClash = true;
                    } else {
                        input.classList.remove('clash-warning');
                    }
                });
                return hasClash;
            }

            function updateStatus() {
                const hasClash = checkNumberClashes();
                if (hasClash) {
                    saveStatus.innerHTML = `Draft auto-saved at ${new Date().toLocaleTimeString()} &mdash; <strong style="color: var(--color-youtube);">⚠️ DUPLICATE NUMBERS DETECTED</strong>`;
                } else {
                    saveStatus.innerText = `Draft auto-saved at ${new Date().toLocaleTimeString()}`;
                }
            }

            // 4. Input & Button Delegation
            container.addEventListener('input', (e) => {
                const cIdx = e.target.dataset.cidx;
                const eIdx = e.target.dataset.eidx;
                const val = e.target.value;

                if (e.target.classList.contains('input-title')) { directoryData[cIdx].title = val; } 
                else if (e.target.classList.contains('input-name')) { directoryData[cIdx].entries[eIdx].name = val; } 
                else if (e.target.classList.contains('input-num')) { directoryData[cIdx].entries[eIdx].number = val; } 
                else if (e.target.classList.contains('input-url')) { directoryData[cIdx].entries[eIdx].url = val; } 
                else if (e.target.classList.contains('input-subtitle')) { directoryData[cIdx].entries[eIdx].subtitle = val; } 
                else if (e.target.classList.contains('input-desc')) { directoryData[cIdx].entries[eIdx].description = val; }
                else if (e.target.classList.contains('input-audio')) { directoryData[cIdx].entries[eIdx].audioUrl = val; }
                
                saveDraft(); updateStatus();
            });

            container.addEventListener('change', (e) => {
                if (e.target.classList.contains('input-is-ad')) {
                    const cIdx = e.target.dataset.cidx;
                    const eIdx = e.target.dataset.eidx;
                    directoryData[cIdx].entries[eIdx].isAd = e.target.checked;
                    if (!e.target.checked) {
                        delete directoryData[cIdx].entries[eIdx].subtitle;
                        delete directoryData[cIdx].entries[eIdx].description;
                    }
                    renderEditor(); saveDraft(); updateStatus();
                } else if (e.target.classList.contains('input-is-hidden')) {
                    const cIdx = e.target.dataset.cidx;
                    const eIdx = e.target.dataset.eidx;
                    directoryData[cIdx].entries[eIdx].isHidden = e.target.checked;
                    
                    // Secret items can't be ads
                    if (e.target.checked) {
                        directoryData[cIdx].entries[eIdx].isAd = false;
                        delete directoryData[cIdx].entries[eIdx].subtitle;
                        delete directoryData[cIdx].entries[eIdx].description;
                    } else {
                        delete directoryData[cIdx].entries[eIdx].audioUrl;
                    }
                    renderEditor(); saveDraft(); updateStatus();
                }
            });

            container.addEventListener('click', (e) => {
                const target = e.target;
                const cIdx = parseInt(target.dataset.cidx);
                const eIdx = parseInt(target.dataset.eidx);

                if (target.classList.contains('move-cat-up')) {
                    const temp = directoryData[cIdx];
                    directoryData[cIdx] = directoryData[cIdx - 1];
                    directoryData[cIdx - 1] = temp;
                    renderEditor(); saveDraft(); updateStatus();
                } else if (target.classList.contains('move-cat-down')) {
                    const temp = directoryData[cIdx];
                    directoryData[cIdx] = directoryData[cIdx + 1];
                    directoryData[cIdx + 1] = temp;
                    renderEditor(); saveDraft(); updateStatus();
                } else if (target.classList.contains('delete-cat')) {
                    if (confirm("Are you sure you want to delete this entire page and all its numbers?")) {
                        directoryData.splice(cIdx, 1);
                        renderEditor(); saveDraft(); updateStatus();
                    }
                } else if (target.classList.contains('delete-ent')) {
                    directoryData[cIdx].entries.splice(eIdx, 1);
                    renderEditor(); saveDraft(); updateStatus();
                } else if (target.classList.contains('add-ent')) {
                    if (!directoryData[cIdx].entries) directoryData[cIdx].entries = [];
                    directoryData[cIdx].entries.push({ name: "", number: "", url: "", isAd: false });
                    renderEditor(); saveDraft(); updateStatus();
                }
            });

            // Drag handles
            container.addEventListener('mousedown', (e) => {
                if (e.target.classList.contains('drag-handle')) {
                    const row = e.target.closest('.entry-row');
                    if (row) row.setAttribute('draggable', 'true');
                }
            });

            container.addEventListener('mouseup', (e) => {
                if (e.target.classList.contains('drag-handle')) {
                    const row = e.target.closest('.entry-row');
                    if (row) row.removeAttribute('draggable');
                }
            });

            // 5. DRAG AND DROP LOGIC
            let draggedEntry = null;

            container.addEventListener('dragstart', (e) => {
                const row = e.target.closest('.entry-row');
                if (row) {
                    draggedEntry = { cIdx: parseInt(row.dataset.cidx), eIdx: parseInt(row.dataset.eidx) };
                    setTimeout(() => row.classList.add('dragging'), 0);
                    e.dataTransfer.effectAllowed = 'move';
                    e.dataTransfer.setData('text/plain', 'entry'); 
                }
            });

            container.addEventListener('dragover', (e) => {
                e.preventDefault();
                if (!draggedEntry) return;

                document.querySelectorAll('.drag-over-row, .drag-over-card').forEach(el => el.classList.remove('drag-over-row', 'drag-over-card'));

                const targetRow = e.target.closest('.entry-row');
                const targetCard = e.target.closest('.category-card');

                if (targetRow && targetRow !== document.querySelector('.dragging')) {
                    targetRow.classList.add('drag-over-row');
                } else if (targetCard && !targetRow) {
                    targetCard.classList.add('drag-over-card');
                }
            });

            container.addEventListener('drop', (e) => {
                e.preventDefault();
                if (!draggedEntry) return;

                const targetRow = e.target.closest('.entry-row');
                const targetCard = e.target.closest('.category-card');

                let toCIdx, toEIdx;

                if (targetRow) {
                    toCIdx = parseInt(targetRow.dataset.cidx);
                    toEIdx = parseInt(targetRow.dataset.eidx);
                } else if (targetCard) {
                    toCIdx = parseInt(targetCard.querySelector('.delete-cat').dataset.cidx);
                    toEIdx = directoryData[toCIdx].entries.length;
                } else {
                    draggedEntry = null; return; 
                }

                const { cIdx: fromCIdx, eIdx: fromEIdx } = draggedEntry;

                if (fromCIdx === toCIdx && fromEIdx === toEIdx) { cleanupDrag(); return; }

                const [movedItem] = directoryData[fromCIdx].entries.splice(fromEIdx, 1);
                if (fromCIdx === toCIdx && fromEIdx < toEIdx) { toEIdx--; }

                directoryData[toCIdx].entries.splice(toEIdx, 0, movedItem);

                renderEditor(); saveDraft(); updateStatus(); draggedEntry = null;
            });

            function cleanupDrag() {
                const row = document.querySelector('.dragging');
                if (row) { row.classList.remove('dragging'); row.removeAttribute('draggable'); }
                document.querySelectorAll('.drag-over-row, .drag-over-card').forEach(el => el.classList.remove('drag-over-row', 'drag-over-card'));
                draggedEntry = null;
            }

            container.addEventListener('dragend', cleanupDrag);

            // 6. Toolbar Buttons
            document.getElementById('btn-add-category').addEventListener('click', () => {
                directoryData.push({ title: "New Page", entries: [] });
                renderEditor(); saveDraft(); updateStatus();
            });

            document.getElementById('btn-reset').addEventListener('click', () => {
                if (confirm("WARNING: This will wipe your current unsaved edits and reload directly from your directory.json file. Proceed?")) {
                    localStorage.removeItem(STORAGE_KEY);
                    directoryData = []; init();
                }
            });

            function getCleanData() {
                return directoryData.map(category => {
                    return {
                        title: category.title,
                        entries: category.entries.filter(entry => 
                            (entry.name && entry.name.trim() !== "") || 
                            (entry.number && entry.number.trim() !== "") || 
                            (entry.url && entry.url.trim() !== "")
                        )
                    };
                });
            }

            document.getElementById('btn-copy').addEventListener('click', async () => {
                const jsonString = JSON.stringify(getCleanData(), null, 4);
                try {
                    await navigator.clipboard.writeText(jsonString);
                    const copyBtn = document.getElementById('btn-copy');
                    const originalText = copyBtn.innerText;
                    copyBtn.innerText = "✅ Copied!";
                    setTimeout(() => { copyBtn.innerText = originalText; }, 2000);
                } catch (err) { alert("Failed to copy to clipboard."); }
            });

            document.getElementById('btn-download').addEventListener('click', () => {
                const blob = new Blob([JSON.stringify(getCleanData(), null, 4)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'directory.json';
                document.body.appendChild(a);
                a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
            });

            init();
        });
    </script>
</body>
</html>
