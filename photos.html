<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Bug & Moss — Photos</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .photo-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 1rem; width: 100%; max-width: 1100px; margin: 1rem auto; }
    .photo-card { background: #fff; border-radius: 10px; overflow: hidden; box-shadow: var(--hard-shadow); }
    .photo-card img { width: 100%; height: 160px; object-fit: cover; display: block; cursor: pointer; }
    h1 { color: var(--color-patreon);}
    p {color: var(--color-patreon);}

    /* Lightbox modal */
    .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: center; z-index: 999; padding: 2rem; visibility: hidden; opacity: 0; transition: opacity .15s ease; }
    .modal.open { visibility: visible; opacity: 1; }
    .modal-content { max-width: 95%; max-height: 95%; text-align: center; }
    .modal-content img { max-width: 100%; max-height: 80vh; border-radius: 6px; }
    .modal-actions { margin-top: 0.6rem; display: flex; gap: 0.6rem; justify-content: center; flex-wrap: wrap; }
    .btn { background: var(--color-podcast); color: #fff; border: none; padding: .45rem .9rem; border-radius: 6px; font-weight: 700; cursor: pointer; }
    .btn.alt { background: #666; }
    .caption { color: #fff; text-align: center; margin-top: .5rem; }

    @media (max-width: 520px) { .photo-card img { height: 120px; } }
  </style>
</head>
<body>
  <h1>Photos</h1>
  <p class="subtitle">Click a photo to open it. Use the buttons to download or copy a shareable URL.</p>

  <main class="desk-container">
    <div class="photo-grid">
      <div class="photo-card"><img src="images/photos/solsticeparty/D92A9238.00_01_23_04.Still017.jpeg" alt="Bug on the left, dressed as the constellation Aries. Moss on the right dressed as a celestial gameshow host." data-src="images/photos/solsticeparty/D92A9238.00_01_23_04.Still017.jpeg"></div>
      <div class="photo-card"><img src="images/photos/solsticeparty/D92A9238.00_01_23_17.Still018.jpeg" alt="Bug on the left, dressed as the constellation Aries. Moss on the right dressed as a celestial gameshow host." data-src="images/photos/solsticeparty/D92A9238.00_01_23_17.Still018.jpeg"></div>
      <div class="photo-card"><img src="images/photos/solsticeparty/D92A9238.00_01_30_08.Still010.jpeg" alt="Bug on the left, dressed as the constellation Aries. Moss on the right dressed as a celestial gameshow host." data-src="images/photos/solsticeparty/D92A9238.00_01_30_08.Still010.jpeg"></div>
      <div class="photo-card"><img src="images/photos/solsticeparty/D92A9238.00_01_31_19.Still012.jpeg" alt="Bug on the left, dressed as the constellation Aries. Moss on the right dressed as a celestial gameshow host." data-src="images/photos/solsticeparty/D92A9238.00_01_31_19.Still012.jpeg"></div>
      <div class="photo-card"><img src="images/photos/solsticeparty/D92A9238.00_01_32_11.Still013.jpeg" alt="Bug on the left, dressed as the constellation Aries. Moss on the right dressed as a celestial gameshow host." data-src="images/photos/solsticeparty/D92A9238.00_01_32_11.Still013.jpeg"></div>
      <div class="photo-card"><img src="images/photos/solsticeparty/D92A9238.00_01_32_23.Still014.jpeg" alt="Bug on the left, dressed as the constellation Aries. Moss on the right dressed as a celestial gameshow host." data-src="images/photos/solsticeparty/D92A9238.00_01_32_23.Still014.jpeg"></div>
      <div class="photo-card"><img src="images/photos/solsticeparty/D92A9238.00_01_33_15.Still015.jpeg" alt="Bug on the left, dressed as the constellation Aries. Moss on the right dressed as a celestial gameshow host." data-src="images/photos/solsticeparty/D92A9238.00_01_33_15.Still015.jpeg"></div>
      <div class="photo-card"><img src="images/photos/solsticeparty/D92A9238.00_01_34_11.Still016.jpeg" alt="Bug on the left, dressed as the constellation Aries. Moss on the right dressed as a celestial gameshow host." data-src="images/photos/solsticeparty/D92A9238.00_01_34_11.Still016.jpeg"></div>
    </div>
  </main>

  <div id="modal" class="modal" role="dialog" aria-hidden="true">
    <div class="modal-content" aria-live="polite">
      <img id="modalImg" src="" alt="">
      <div class="modal-actions">
        <a id="downloadBtn" class="btn" href="#" download>Download</a>
        <button id="copyBtn" class="btn alt">Copy URL</button>
        <button id="closeBtn" class="btn">Close</button>
      </div>
      <div class="caption" id="caption"></div>
    </div>
  </div>

  <script>
    document.querySelectorAll('.photo-grid img').forEach(img => {
      img.addEventListener('click', () => openModal(img.dataset.src || img.src, img.alt));
    });

    const modal = document.getElementById('modal');
    const modalImg = document.getElementById('modalImg');
    const caption = document.getElementById('caption');
    const downloadBtn = document.getElementById('downloadBtn');

    function openModal(src, alt) {
      modal.classList.add('open');
      modalImg.src = src;
      modalImg.alt = alt || '';
      caption.textContent = alt || '';
      downloadBtn.href = src;
      modal.setAttribute('aria-hidden', 'false');
    }

    function closeModal() {
      modal.classList.remove('open');
      modal.setAttribute('aria-hidden', 'true');
      modalImg.src = '';
    }

    document.getElementById('closeBtn').addEventListener('click', closeModal);
    modal.addEventListener('click', e => { if (e.target === modal) closeModal(); });

    document.getElementById('copyBtn').addEventListener('click', async () => {
      try {
        const base = location.origin + location.pathname.replace(/[^\/]+$/, '');
        const url = base + (modalImg.src || '');
        await navigator.clipboard.writeText(url);
        alert('Image URL copied');
      } catch (e) {
        alert('Copy failed — try downloading instead');
      }
    });
  </script>
</body>
</html>
